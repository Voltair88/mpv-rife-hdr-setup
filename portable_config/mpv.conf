# Start in fullscreen mode by default.
fs=no

# For UOSC
osc=no
osd-bar=no
border=no


#
#   HWACCELL
#
vo=gpu-next
gpu-api=d3d11
d3d11-flip=yes
hwdec=auto-copy


#
#   VIDEO
#
hr-seek-framedrop=no
# framedrop=vo (was no): lets mpv drop a late RIFE frame to STAY locked to audio instead of
# drifting into A-V desync when the filter momentarily can't sustain 48fps. This is the proper
# sync mechanism -- it decouples A-V sync from raw throughput, so we don't need to brute-force
# it with CPU threads. Trade: a rare brief motion hitch instead of progressive desync.
framedrop=vo
video-sync=audio
demuxer-readahead-secs=10
demuxer-max-bytes=200M
interpolation=no
# audio-delay is now managed automatically by scripts/voicemeeter-sync.lua, which detects the active
# Voicemeeter hardware output (e.g. Nuraphone BT ~-0.350 vs wired ~0) and applies the right offset.
# Still fine-tunable live with Ctrl++/Ctrl+- (50ms steps), and Ctrl+Shift+s saves the current value
# for the current output. See script-opts/voicemeeter-sync.conf. Set enabled=no there to revert.


#
#   AUDIO
#
audio-exclusive=no # Enable this if you only want audio from mpv.


#
#   COLOR SETTINGS
#
target-colorspace-hint=yes
target-prim=auto # Set to your display primaries or auto
target-trc=auto # Set to your display gamma or auto
video-output-levels=full
target-peak=1000 # Samsung G95SC QD-OLED DisplayHDR 1000
allow-delayed-peak-detect=no
tone-mapping=auto
hdr-contrast-recovery=0.6
# QD-OLED has effectively infinite contrast / true blacks -- tell libplacebo so it tone-maps shadows
# for an OLED instead of assuming a default contrast (deeper blacks, better dark detail).
target-contrast=inf
# RIFE (vapoursynth) strips Dolby Vision's per-scene metadata (mpv #10438), so the DV-base HDR10 is
# tone-mapped statically. Compensate with libplacebo's pixel-based dynamic peak detection: ignore the
# top 0.005% specular outliers so the adaptive peak tracks the actual scene (approximates DV's behaviour).
hdr-peak-percentile=99.995


#
#   SCALING
#
# scale only applies when mpv itself resizes the image -- i.e. when RIFE is OFF (rife.vpy already
# resizes to 1440p internally, so with RIFE on this kernel is idle). ewa_lanczossharp is a sharp
# polar Lanczos; scale-antiring tames its ringing (0.8 is a good balance for sharp filters).
scale=ewa_lanczossharp
scale-antiring=0.8
# cscale = CHROMA upscaling. Unlike scale, this ALWAYS runs (rife.vpy outputs 4:2:0, so mpv upscales
# chroma to display even with RIFE on). bilinear was the softest option -> soft colour edges / fringing.
# spline36 is a high-quality, low-cost chroma kernel (use ewa_lanczossharp for more sharpness).
cscale=spline36
deband=no

# --- Subtitles / OSD ---
sub-font="Segoe UI"
sub-font-size=50
sub-bold=yes
sub-color="#FFFFFFFF"
sub-border-size=3.0
sub-shadow-offset=0.8
sub-shadow-color="#AA000000"
osd-font-size=12
osd-border-size=2

#
#   LOGGING
#
# Logging disabled. Re-enable temporarily for troubleshooting:
#   log-file="C:/Users/volta/AppData/Local/Temp/mpv-diag.log"

#
#   RIFE INTERPOLATION (enabled by default)
#
vf-add=@rife:vapoursynth="~~/rife.vpy"

#
#   PROFILES
#
[rife]
vf-add=@rife:vapoursynth="~~/rife.vpy"

# Auto color profiles by source type. rife.vpy now tags SDR sources as BT.709 (HDR stays PQ), so
# these conditions fire correctly even with RIFE on. SDR gets debanding (8-bit gradients band on a
# big OLED); HDR skips it (10-bit, and debanding can smear fine HDR detail). profile-restore reverts
# the change when switching to a file of the other type.
[hdr]
profile-cond=(get("video-params/gamma") or "")=="pq" or (get("video-params/gamma") or "")=="hlg"
profile-restore=copy-equal
# Gentle HDR debanding -- a big OLED shows banding in dark HDR gradients. Kept light (1 iteration, low
# threshold, low grain) so it doesn't smear fine HDR detail or blow the ~89% GPU budget on 4K+RIFE.
# Verify with statlog that 4K HDR still holds ~48fps; lower/remove if it regresses.
deband=yes
deband-iterations=1
deband-threshold=24
deband-grain=8

[sdr]
profile-cond=(get("video-params/gamma") or "")~="pq" and (get("video-params/gamma") or "")~="hlg" and (get("video-params/gamma") or "")~=""
profile-restore=copy-equal
deband=yes
deband-iterations=2
