# spatial.lua configuration
# mpv read_options format: key=value (NO spaces around =), booleans are yes/no

# Master switch.
enabled=yes

# Auto-apply virtual surround when the source is multichannel (>2ch) AND output is headphones.
# no = only apply via the manual toggle (Ctrl+Shift+V). Default no: the plain 5.1->stereo downmix
# (HRTF off) is crisp/clean/direct and is the right choice for most listening; HRTF stays one keypress
# away for when you want the immersive/placed feel on a big action film.
auto=no

# HRTF SOFA file (SimpleFreeFieldHRIR convention). Required for any spatialization.
# Download one with your BROWSER (servers hotlink-block scripts) and drop it at the path below, e.g.:
#   - SADIE II (Univ. of York, CC-BY): https://www.york.ac.uk/sadie-project/database.html
#   - ARI / others via the SOFA repository: https://www.sofaconventions.org  (Files page)
# IMPORTANT: use a path with NO SPACES (FFmpeg's filtergraph can't handle spaces in the path), so do
# NOT put it under "Program Files". A user folder like below works. Forward slashes.
sofa=C:/Users/volta/mpv-hrtf/hrtf.sofa

# Makeup gain in dB. sofalizer's normalized output sits a bit below the plain downmix, so a few dB
# here roughly level-matches the toggle to OFF (so a fair A/B isn't skewed by ON simply being quieter).
gain=9
# Gain in dB for the LFE/.1 channel. Headphones can't reproduce sub-bass well and a full-level LFE
# summed into both ears makes the mix boomy, so attenuate it (negative). -10 tames it a lot; go more
# negative (e.g. -20) to nearly drop it, or toward 0 for more low-end impact.
lfe_gain=-10
# Interpolate between HRTF measurement points (yes = smoother, slightly more CPU).
interpolate=yes

# Corrective EQ appended after sofalizer. Measured: this KU100 HRTF tilts the output by ~+4dB bass and
# ~-6dB treble vs the flat direct downmix (that's the "bass-heavy / less crisp" coloration). This EQ
# inverts that tilt (cut lows, lift highs) to flatten it back to ±~1.5dB, so ON keeps the surround
# placement but regains the crisp/direct balance. Empty = no EQ. Tweak to taste (e.g. raise the
# 2000Hz bell's g for more presence). Standard FFmpeg af syntax, comma-separated, NO spaces.
eq=lowshelf=g=-4.5:f=180:width_type=q:w=0.7,equalizer=f=380:width_type=q:w=1.0:g=-2,equalizer=f=2000:width_type=q:w=1.4:g=2,equalizer=f=4000:width_type=q:w=1.2:g=-1.5,equalizer=f=8000:width_type=q:w=1.2:g=2.5,equalizer=f=16000:width_type=q:w=0.7:g=-2.5

# Override virtual speaker ANGLES to push the surrounds "behind" you (headphone HRTF often makes rears
# feel in-front). Azimuth degrees: 0=front, 90=left, 180=directly behind, 270=right. So the LEFT
# surround moves toward 180 and the RIGHT surround toward 180 from the other side (360-x).
#   more behind: SL 160|SR 200   |   less: SL 120|SR 240   |   default sofalizer: leave empty
# For 5.1(side) files the surrounds are SL/SR; for 5.1(back) use BL/BR. Syntax: "CH AZIM|CH AZIM".
# FRONTS: FL = front-left, FR = front-right (mirror = 360-FL), FC = centre (keep 0 for dialogue).
#   default-ish front stage: FL 30|FR 330   |   wider/more spacious: FL 45|FR 315   |   narrower: FL 20|FR 340
# (Caveats: too close to 180 collapses the rears' L/R; very wide fronts weaken the phantom centre.)
speakers=FL 30|FR 330|FC 0|SL 160|SR 200

# Apply HRTF only when the active Voicemeeter output name matches one of these comma-separated,
# case-insensitive patterns (your headphones). HRTF sounds wrong on stereo speakers (crosstalk), so
# the Realtek "Högtalare" speakers are intentionally NOT listed. Output name comes from
# voicemeeter-sync.lua via the user-data/voicemeeter/output property.
headphone_match=nura,buds,hörlurar,headphone,headset,earphone
