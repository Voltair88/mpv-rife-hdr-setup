# voicemeeter-sync.lua configuration
# mpv read_options format: key=value (NO spaces around =), booleans are yes/no

# Master switch. no = behave like before (this script never touches audio-delay).
enabled=yes

# Full path to the 64-bit Voicemeeter Remote API DLL (installed with Voicemeeter).
dll_path=C:\Program Files (x86)\VB\Voicemeeter\VoicemeeterRemote64.dll

# Which Voicemeeter virtual input mpv plays into: VAIO | AUX | VAIO3, or a numeric strip index.
# Default mpv->Voicemeeter routing is the main "Voicemeeter Input" = VAIO. Change only if you point
# mpv at the AUX / VAIO3 input instead.
input_strip=VAIO

# How often (seconds) to check Voicemeeter's "something changed" flag. This is a cheap in-process
# call, so 1.0 keeps re-routing latency low without any real cost.
poll_interval=1.0

# audio-delay (seconds) applied when the active output can't be determined (Voicemeeter not running)
# or when no rule / saved value matches the output. 0.0 is the safe wired/HDMI baseline; the
# Bluetooth offset is handled by a rule in voicemeeter-sync.json (see below).
default_delay=0.0

# Show a small OSD note each time the delay changes (yes/no).
show_osd=yes

# --- How the right delay is chosen (voicemeeter-sync.json, auto-created) ---
# On each change the script builds a "signature" from the name(s) of the hardware output device(s)
# Voicemeeter is currently routing mpv to, then picks a delay in this order:
#   1. exact:  a value you saved for that exact output (save hotkey) -- wins over everything
#   2. rules:  first substring rule that matches the device name. Seeded: "nuraphone 386" -> -0.350
#              for the Nuraphone over BLUETOOTH (it enumerates as "Hörlurar (N- nuraphone 386)"; the
#              rule keys on the model id, not the volatile "N-" index). The same headphones over
#              CABLE enumerate as "Högtalare (nuraphone)" -- a different name that is pinned to 0.0
#              via an exact entry below (both names contain "nura", so they must be told apart).
#   3. default_delay
#
# Calibrate any output once: nudge audio-delay with Ctrl++/Ctrl- until it's in sync, then press
# Ctrl+Shift+s to remember it for that exact output. Re-sync manually any time with:
#   script-message voicemeeter-sync/resync
