# tmdb-info.lua configuration
# mpv read_options format: key=value (NO spaces around =), booleans are yes/no

# TMDb v3 API key (REQUIRED). Get a free one at:
#   https://www.themoviedb.org/  ->  Settings  ->  API  ->  Create  ->  API Key (v3 auth)
api_key=

# Metadata language (TMDb ISO code), e.g. en-US, sv-SE, de-DE
language=en-US

# Poster width in pixels (height is derived from the poster's aspect ratio)
poster_width=260

# (Deprecated / unused.)
display_seconds=8

# Prefetch metadata + render the card when a file loads so the first reveal is instant (yes/no).
# Set no to fetch lazily on the first mouse movement instead.
auto_show=yes

# --- Visibility ---
# The card acts like a hover zone in its corner: it shows while the mouse moves INSIDE the card's
# area, and hides when the cursor moves outside it (or leaves the window). Ctrl+i pins it on.
# Smooth fade in/out (yes/no), fade length in seconds, and number of opacity steps.
# More steps = smoother fade but a larger cached card file (file size scales with steps+1).
fade=yes
fade_duration=0.18
fade_steps=5
# Small frosted "Loading…" spinner shown while the card is still being fetched/composed (yes/no),
# and how long the card may be "not ready" before it appears (so cached cards don't flash it).
loading_indicator=yes
loading_delay=0.15

# --- HDR color ---
# On HDR video, mpv treats the overlay bitmap as already display-native, so a plain sRGB card
# looks oversaturated. The script fixes this PROPERLY by encoding the card into BT.2020+PQ at a
# reference brightness -- no saturation guessing. Auto-detected from the video's transfer.
#   auto = encode only on HDR (pq/hlg) video   |   yes = always   |   no = never (raw sRGB)
hdr_compensate=auto
# Card brightness on HDR, in nits. 203 = standard reference white. Lower if too bright (e.g. 150),
# raise if too dim (e.g. 250). This is the ONLY color dial you should ever need.
card_nits=203

# Show the wide backdrop image as a dimmed, frosted background behind the whole card (yes/no).
show_backdrop=yes

# Frosted-glass blur on that backdrop (yes/no). no = a sharp (still dimmed) backdrop image.
backdrop_blur=yes

# Panel anchor: top-left | top-right | bottom-left | bottom-right
position=top-left

# Pixel margin from the screen edge
margin=60
