# chapterskip.lua configuration
# mpv read_options format: key=value (NO spaces around =), booleans are yes/no

# Master switch.
enabled=yes

# Semicolon-separated, case-insensitive Lua patterns matched against chapter TITLES. Any chapter
# whose title contains one of these is auto-skipped. Only works on files that actually have named
# chapters. Edit to taste; remove "credits"/"ending" if you like watching end credits.
skip=intro;opening;op ;ed ;recap;previously;preview;next time;credits;ending;outro

# Show a brief OSD note when a chapter is skipped (yes/no).
osd=yes
