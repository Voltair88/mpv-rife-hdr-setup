# Socket path (leave empty for auto)
socket=

# Thumbnail path (leave empty for auto)
thumbnail=

# Maximum thumbnail generation size in pixels (scaled down to fit)
# Values are scaled when hidpi is enabled
max_height=200
max_width=200

# Scale factor for thumbnail display size (requires mpv 0.38+)
# Note that this is lower quality than increasing max_height and max_width
scale_factor=1

# Apply tone-mapping, no to disable.
# tone_mapping=no: proper HDR tone-mapping in the headless worker is too slow for live
# scrubbing (libplacebo re-inits Vulkan every seek = 1-3s/thumb; zscale hangs outright on
# Dolby Vision). Without it, the worker renders in ~0.5s and the image is still clearly
# visible (avg brightness ~114/255). Colors look a bit flat (no highlight roll-off) but
# previews are fast and recognizable instead of black/frozen.
tone_mapping=no

# Overlay id
overlay_id=42

# Spawn thumbnailer on file load for faster initial thumbnails
# spawn_first=no: pre-spawning doesn't help during RIFE playback (the worker still can't acquire
# decode resources until RIFE idles/pauses -- proven via worker logs), so lazy spawn-on-hover is
# fine for the paused-only workflow.
spawn_first=no

# Close thumbnailer process after an inactivity period in seconds, 0 to disable
quit_after_inactivity=0

# Enable on network playback
network=no

# Enable on audio playback
audio=no

# Enable hardware decoding
# hwdec=no: during RIFE playback, hwdec=auto picks d3d11va-copy whose device creation BLOCKS
# ~17s because RIFE owns the D3D11 device (gpu-api=d3d11); NVDEC can't create a device at all
# (CUDA held by TensorRT). So HW decode doesn't help the live case either. For paused-only
# (RIFE idle), software decode is plenty fast. See research notes in the project memory.
hwdec=no

# Windows only: use native Windows API to write to pipe (requires LuaJIT)
direct_io=no

# Custom path to the mpv executable
# Absolute path required on this portable install — bare "mpv" isn't on PATH,
# which caused intermittent "mpv subprocess create failed / init" errors.
mpv_path=C:/Program Files/mpv-enhanced-installer/mpv-enhanced-installer/mpv.exe
