ctrl+shift+r script-message toggle_rife

# Audio delay in 50ms steps (overrides mpv's default 100ms) -- both main +/- and numpad +/-
Ctrl++ add audio-delay 0.050
Ctrl+- add audio-delay -0.050
Ctrl+KP_ADD add audio-delay 0.050
Ctrl+KP_SUBTRACT add audio-delay -0.050
# Save the current audio-delay for the current Voicemeeter output (voicemeeter-sync.lua)
Ctrl+shift+s script-binding voicemeeter_sync/save

# Movie info card (poster + rating + plot) -- tmdb-info.lua
Ctrl+i script-binding tmdb_info/toggle

# Tools menu (RIFE, info card, sharpen, audio-delay) -- tools-menu.lua / uosc
Ctrl+t script-binding tools_menu/open

# Toggle hardware + playback stats logging to %TEMP%\mpv-statlog_*.csv -- statlog.lua
Ctrl+shift+l script-binding statlog/toggle

# Open uosc's Subtitles menu (local/embedded tracks + "Search online" OpenSubtitles download, en->sv)
Ctrl+shift+d script-binding uosc/subtitles

# Toggle binaural virtual surround for multichannel content on headphones (spatial.lua: auto/on/off)
Ctrl+shift+v script-binding spatial/toggle